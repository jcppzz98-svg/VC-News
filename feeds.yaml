# VC list. Each entry becomes a Google News RSS search.
# Tweak the `query` field for any firm whose name is ambiguous
# (we already disambiguated the common ones).

vcs:
  # Top-tier
  - { name: "Sequoia Capital",            query: '"Sequoia Capital"' }
  - { name: "Andreessen Horowitz",        query: '"Andreessen Horowitz" OR a16z' }
  - { name: "Accel",                      query: '"Accel Partners" OR ("Accel" (fund OR venture OR invest))' }
  - { name: "Benchmark",                  query: '"Benchmark Capital" OR ("Benchmark" (venture OR partners))' }
  - { name: "Lightspeed Venture Partners", query: '"Lightspeed Venture Partners"' }
