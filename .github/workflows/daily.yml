name: vc-news-daily

on:
  schedule:
    # GitHub Actions cron runs in UTC and does not observe DST.
    # 09:00 Europe/Rome is 07:00 UTC (CEST, summer) or 08:00 UTC (CET, winter).
    # We fire at BOTH times; the script only posts when local time is 09:xx.
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run (ignore the 09:xx Rome time check)'
        required: false
        default: true
        type: boolean
      dry_run:
        description: 'Dry run (print instead of posting to Discord)'
        required: false
        default: false
        type: boolean

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          FORCE_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '1' || '' }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '1' || '' }}
        run: python vc_news_bot.py

      - name: Commit updated state
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update VC news state [skip ci]"
          git push
